<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon-light.svg" id="app-favicon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=block" />
  <style>
    html,
    body {
      background: #f4f7f1;
    }

    html[data-theme="dark"],
    html[data-theme="dark"] body {
      background: #111513;
      color: #edf5ee;
      color-scheme: dark;
    }
  </style>
  <script>
    (function () {
      var themeKey = "budget-base-theme";
      var theme = "light";

      try {
        theme = localStorage.getItem(themeKey) || theme;
      } catch (error) {
        theme = "light";
      }

      document.documentElement.dataset.theme = theme;
      document.documentElement.style.backgroundColor = theme === "dark" ? "#111513" : "#f4f7f1";

      var favicon = document.getElementById("app-favicon");
      if (favicon) {
        favicon.href = theme === "dark" ? "/favicon-dark.svg" : "/favicon-light.svg";
      }
    })();
  </script>
  <title>Budget Base</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
