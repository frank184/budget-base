<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon-light.svg" id="app-favicon" />
  <title>Budget Base</title>
</head>

<body>
  <div id="root"></div>
  <script>
    (function () {
      var themeKey = "budget-base-theme";
      var theme = localStorage.getItem(themeKey) || "light";
      var favicon = document.getElementById("app-favicon");
      if (favicon) {
        favicon.href = theme === "dark" ? "/favicon-dark.svg" : "/favicon-light.svg";
      }
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
